name: Ping RSVP page

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping RSVP URL
        run: |
          response=$(curl -sS -o /tmp/response.txt -w "%{http_code}" \
            --max-time 30 \
            "https://oscar-peiyu-wedding.vercel.app/rsvp")
          echo "HTTP status: $response"
          cat /tmp/response.txt | head -c 500
          if [ "$response" -lt 200 ] || [ "$response" -ge 400 ]; then
            echo "Unexpected status code: $response"
            exit 1
          fi
